<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تسجيل الدخول — A to Z Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-blue: #0075AF;
      --brand-teal: #06918A;
      --brand-gold: #FFC200;
      --brand-dark-gold: #C48700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; min-height: 100vh; overflow: hidden; }

    .page-bg {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1628 0%, #0d2a4a 40%, #0a4a52 100%);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .page-bg::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 15% 40%, rgba(6,145,138,0.25) 0%, transparent 55%),
                  radial-gradient(circle at 85% 15%, rgba(0,117,175,0.3) 0%, transparent 50%),
                  radial-gradient(circle at 50% 90%, rgba(255,194,0,0.06) 0%, transparent 40%);
    }
    .grid-bg {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .login-card {
      background: rgba(255,255,255,0.97);
      border-radius: 28px;
      padding: 3rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.1);
      position: relative;
      z-index: 10;
      animation: cardAppear 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .form-label {
      display: block;
      font-weight: 700;
      font-size: 0.88rem;
      color: #1e293b;
      margin-bottom: 0.5rem;
    }
    .form-input {
      width: 100%;
      padding: 0.85rem 1.1rem;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem;
      color: #1e293b;
      transition: all 0.3s ease;
      background: #f8fafc;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--brand-blue);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0,117,175,0.1);
    }
    .form-input::placeholder { color: #94a3b8; }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--brand-blue), var(--brand-teal));
      color: #fff;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.9rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,117,175,0.3);
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,117,175,0.4);
    }
    .btn-login:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: #94a3b8;
      font-size: 0.82rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .social-btn {
      width: 100%;
      padding: 0.8rem;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      font-family: 'Cairo', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      color: #334155;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }
    .social-btn:hover {
      border-color: var(--brand-blue);
      color: var(--brand-blue);
      transform: translateY(-1px);
    }

    /* Toast */
    #toast {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      min-width: 280px;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      display: none;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      animation: slideIn 0.4s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .toast-success { background: #fff; border-right: 4px solid #10b981; color: #065f46; }
    .toast-error { background: #fff; border-right: 4px solid #ef4444; color: #991b1b; }

    /* Floating elements */
    .float-shape {
      position: absolute;
      border-radius: 50%;
      animation: floatShape 6s ease-in-out infinite;
    }
    @keyframes floatShape {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="page-bg">
  <div class="grid-bg"></div>

  <!-- Decorative shapes -->
  <div class="float-shape" style="width:200px;height:200px;top:10%;left:5%;background:rgba(0,117,175,0.08);animation-delay:0s;"></div>
  <div class="float-shape" style="width:120px;height:120px;bottom:15%;right:10%;background:rgba(255,194,0,0.08);animation-delay:2s;animation-duration:8s;"></div>
  <div class="float-shape" style="width:80px;height:80px;top:30%;right:15%;background:rgba(6,145,138,0.1);animation-delay:4s;"></div>

  <div class="login-card" style="overflow:hidden;">
    <!-- Top accent -->
    <div style="position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#0075AF,#06918A,#FFC200);"></div>

    <!-- Header -->
    <div class="text-center mb-8">
      <a href="index.html" class="flex items-center justify-center gap-3 mb-6">
 
      <!-- Logo -->
      <div class="flex items-center gap-3">
        <img src="assets/MAIN LOGO LIGHT (Transparent).png" alt="A to Z Academy Logo" class="w-9 h-9 object-contain">
        </div>

        <span style="font-family:'Tajawal',sans-serif;font-weight:800;font-size:1.3rem;background:linear-gradient(135deg,#0075AF,#06918A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">A to Z Academy</span>
      </a>
      <p style="color:#64748b;font-size:0.92rem;">سجّل دخولك للوصول إلى كورساتك</p>
    </div>

    <!-- Form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div style="margin-bottom:1.25rem;">
        <label class="form-label" for="email">البريد الإلكتروني</label>
        <div style="position:relative;">
          <input type="email" id="email" class="form-input" placeholder="example@email.com" required/>
          <span style="position:absolute;top:50%;transform:translateY(-50%);left:1rem;color:#94a3b8;">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/></svg>
          </span>
        </div>
      </div>

      <div style="margin-bottom:0.75rem;">
        <label class="form-label" for="password">كلمة المرور</label>
        <div style="position:relative;">
          <input type="password" id="password" class="form-input" placeholder="أدخل كلمة المرور" required/>
          <button type="button" onclick="togglePassword()" style="position:absolute;top:50%;transform:translateY(-50%);left:1rem;color:#94a3b8;background:none;border:none;cursor:pointer;">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>

      <div style="text-align:left;margin-bottom:1.5rem;">
        <a href="#" style="color:#0075AF;font-size:0.82rem;font-weight:600;text-decoration:none;">نسيت كلمة المرور؟</a>
      </div>

      <button type="submit" class="btn-login" id="login-btn">
        <span id="btn-text">تسجيل الدخول</span>
        <span id="btn-loader" style="display:none;">⏳ جاري التحقق...</span>
      </button>
    </form>

    <div class  divider my-6">أو تسجيل الدخول بـ</div>

    <button class="social-btn" onclick="showToast('سيتم إضافة هذه الميزة قريباً', 'error')">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      متابعة بـ Google
    </button>

    <div style="text-align:center;margin-top:1.5rem;color:#64748b;font-size:0.88rem;">
      ليس لديك حساب؟ 
      <a href="signup.html" style="color:#0075AF;font-weight:700;text-decoration:none;">إنشاء حساب جديد</a>
    </div>
  </div>
</div>

<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script>
  // Redirect if already logged in
  const currentUser = JSON.parse(localStorage.getItem('atoz_current_user') || 'null');
  if (currentUser) window.location.href = 'courses.html';

  function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btnText = document.getElementById('btn-text');
    const btnLoader = document.getElementById('btn-loader');

    btnText.style.display = 'none';
    btnLoader.style.display = 'inline';

    setTimeout(() => {
      const users = JSON.parse(localStorage.getItem('atoz_users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        localStorage.setItem('atoz_current_user', JSON.stringify(user));
        showToast('تم تسجيل الدخول بنجاح! 🎉', 'success');
        setTimeout(() => window.location.href = 'courses.html', 1200);
      } else {
        btnText.style.display = 'inline';
        btnLoader.style.display = 'none';
        showToast('البريد الإلكتروني أو كلمة المرور غير صحيحة', 'error');
      }
    }, 900);
  }

  function showToast(msg, type) {
    const toast = document.getElementById('toast');
    toast.className = `toast-${type}`;
    toast.style.display = 'flex';
    toast.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span><span>${msg}</span>`;
    setTimeout(() => { toast.style.display = 'none'; }, 3500);
  }
</script>
</body>
</html>
